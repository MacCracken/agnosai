[workspace]
resolver = "2"
members = [
    "crates/agnosai-core",
    "crates/agnosai-orchestrator",
    "crates/agnosai-llm",
    "crates/agnosai-fleet",
    "crates/agnosai-sandbox",
    "crates/agnosai-tools",
    "crates/agnosai-learning",
    "crates/agnosai-server",
    "crates/agnosai-definitions",
    "tests/integration",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
repository = "https://github.com/maccracken/agnosai"
rust-version = "1.89"

[workspace.dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }

# HTTP
axum = "0.8"
reqwest = { version = "0.12", features = ["json", "stream", "rustls-tls"], default-features = false }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Concurrency
dashmap = "6"

# Error handling
thiserror = "2"
anyhow = "1"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# IDs & time
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# gRPC
tonic = "0.13"
prost = "0.13"

# TLS
rustls = "0.23"

# Redis
redis = { version = "0.28", features = ["tokio-comp", "connection-manager"] }

# WASM sandbox
wasmtime = "29"
wasmtime-wasi = "29"

# Testing
tokio-test = "0.4"
tempfile = "3"

# Internal crates
agnosai-core = { path = "crates/agnosai-core" }
agnosai-orchestrator = { path = "crates/agnosai-orchestrator" }
agnosai-llm = { path = "crates/agnosai-llm" }
agnosai-fleet = { path = "crates/agnosai-fleet" }
agnosai-sandbox = { path = "crates/agnosai-sandbox" }
agnosai-tools = { path = "crates/agnosai-tools" }
agnosai-learning = { path = "crates/agnosai-learning" }
agnosai-server = { path = "crates/agnosai-server" }
agnosai-definitions = { path = "crates/agnosai-definitions" }

[profile.release]
opt-level = 2
lto = "fat"
strip = true
panic = "abort"
codegen-units = 1
