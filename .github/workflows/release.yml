name: Release

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs: [ci]
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation deps (arm64)
        if: matrix.arch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          ARCHIVE="agnosai-server-${VERSION}-linux-${{ matrix.arch }}.tar.gz"
          tar czf "${ARCHIVE}" -C target/${{ matrix.target }}/release agnosai-server
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agnosai-${{ matrix.arch }}
          path: |
            agnosai-server-*.tar.gz
            agnosai-server-*.sha256

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ci, build]
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            agnosai-server-*.tar.gz
            agnosai-server-*.sha256
          generate_release_notes: true
